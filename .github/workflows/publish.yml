name: Publish to NuGet

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version to publish, for example 1.0.0'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ inputs.version }}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "::error::Version is required. Use a tag such as v1.0.0 or provide the workflow_dispatch version input."
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate version matches project
        shell: bash
        run: |
          PROJECT_FILE="src/MonriPaymentGateway/MonriPaymentGateway.csproj"
          PROJECT_VERSION=$(sed -n 's:.*<Version>\(.*\)</Version>.*:\1:p' "$PROJECT_FILE" | head -n 1)

          if [[ -z "$PROJECT_VERSION" ]]; then
            echo "::error::Could not find <Version> in $PROJECT_FILE."
            exit 1
          fi

          if [[ "$PROJECT_VERSION" != "${{ steps.version.outputs.VERSION }}" ]]; then
            echo "::error::Tag version (${{ steps.version.outputs.VERSION }}) does not match project version ($PROJECT_VERSION)."
            exit 1
          fi

      - name: Restore
        run: dotnet restore src/MonriPaymentGateway/MonriPaymentGateway.csproj

      - name: Pack
        run: dotnet pack src/MonriPaymentGateway/MonriPaymentGateway.csproj -c Release --no-restore -o ./artifacts

      - name: NuGet login (OIDC)
        id: login
        uses: NuGet/login@v1
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        working-directory: artifacts
        run: dotnet nuget push *.nupkg --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --symbol-source https://symbols.nuget.org/download/symbols --skip-duplicate
